<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Video Report Search</title>
<style>
  :root {
    --bg: #0f1216;
    --panel: #171b21;
    --border: #262c35;
    --text: #e8eaed;
    --muted: #8b93a1;
    --accent: #4f8cff;
    --accent-soft: #1c2c4d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .wrap { width: 100%; max-width: 760px; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
  .search-box {
    display: flex;
    gap: 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px;
  }
  input[type="text"] {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 15px;
    padding: 10px 8px;
  }
  input[type="text"]::placeholder { color: var(--muted); }
  button {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  .examples { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    font-size: 12.5px;
    color: var(--muted);
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 999px;
    cursor: pointer;
  }
  .chip:hover { color: var(--text); border-color: var(--accent); }
  .answer {
    margin-top: 28px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    white-space: pre-wrap;
    line-height: 1.55;
    font-size: 15px;
    display: none;
  }
  .sources { margin-top: 16px; display: none; }
  .sources h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin: 0 0 10px; }
  .source-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    font-size: 13.5px;
  }
  .source-card .name { font-weight: 600; margin-bottom: 4px; }
  .source-card .meta { color: var(--muted); margin-bottom: 6px; }
  .source-card .caption { color: var(--text); line-height: 1.45; margin-bottom: 10px; }
  .source-card video {
    width: 100%;
    max-height: 320px;
    border-radius: 8px;
    background: #000;
    display: block;
  }
  .source-card .no-video {
    font-size: 12.5px;
    color: var(--muted);
    font-style: italic;
  }
  .badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
    margin-left: 6px;
  }
  .loading { color: var(--muted); font-size: 14px; margin-top: 20px; display: none; }
  .error { color: #ff6b6b; margin-top: 20px; display: none; font-size: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Video Report Search</h1>
  <div class="sub">Ask anything about the inspected videos - captions, labels, dates, or validation results.</div>

  <div class="search-box">
    <input id="queryInput" type="text" placeholder="e.g. which videos show technicians last week?" />
    <button id="askBtn">Ask</button>
  </div>

  <div class="examples">
    <span class="chip">Videos where a person is wearing a helmet</span>
    <span class="chip">Sites where a battery is being carried</span>
    <span class="chip">Last month, activity between 4 and 5 PM</span>
    <span class="chip">Any hallucinated detections?</span>
  </div>

  <div class="loading" id="loading">Thinking…</div>
  <div class="error" id="error"></div>
  <div class="answer" id="answer"></div>
  <div class="sources" id="sources">
    <h3>Sources</h3>
    <div id="sourceList"></div>
  </div>
</div>

<script>
  const input = document.getElementById("queryInput");
  const askBtn = document.getElementById("askBtn");
  const answerEl = document.getElementById("answer");
  const sourcesEl = document.getElementById("sources");
  const sourceListEl = document.getElementById("sourceList");
  const loadingEl = document.getElementById("loading");
  const errorEl = document.getElementById("error");

  document.querySelectorAll(".chip").forEach(chip => {
    chip.addEventListener("click", () => {
      input.value = chip.textContent;
      ask();
    });
  });

  input.addEventListener("keydown", e => { if (e.key === "Enter") ask(); });
  askBtn.addEventListener("click", ask);

  async function ask() {
    const query = input.value.trim();
    if (!query) return;

    answerEl.style.display = "none";
    sourcesEl.style.display = "none";
    errorEl.style.display = "none";
    loadingEl.style.display = "block";
    askBtn.disabled = true;

    try {
      const res = await fetch("/api/query", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query }),
      });
      const data = await res.json();

      if (!res.ok) throw new Error(data.error || "Something went wrong.");

      answerEl.textContent = data.answer;
      answerEl.style.display = "block";

      sourceListEl.innerHTML = "";
      if (data.sources && data.sources.length) {
        data.sources.forEach(s => {
          const card = document.createElement("div");
          card.className = "source-card";
          const videoBlock = s.video_url
            ? `<video controls preload="none" src="${s.video_url}"></video>`
            : `<div class="no-video">Video file not found locally (check VIDEOS_DIR).</div>`;
          card.innerHTML = `
            <div class="name">${s.video}<span class="badge">${s.classification || "n/a"}</span></div>
            <div class="meta">${s.date || ""} ${s.time || ""} &middot; ${s.labels || "no labels"}</div>
            <div class="caption">${s.summary_caption || ""}</div>
            ${videoBlock}
          `;
          sourceListEl.appendChild(card);
        });
        sourcesEl.style.display = "block";
      }
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.style.display = "block";
    } finally {
      loadingEl.style.display = "none";
      askBtn.disabled = false;
    }
  }
</script>
</body>
</html>
